services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Laravel}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DB_CONNECTION: ${DB_CONNECTION:-mariadb}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-cafe_api}
      DB_USERNAME: ${DB_USERNAME:-cafe}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      CACHE_STORE: ${CACHE_STORE:-file}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      OCTANE_SERVER: ${OCTANE_SERVER:-frankenphp}
      OCTANE_HOST: ${OCTANE_HOST:-0.0.0.0}
      OCTANE_PORT: ${OCTANE_PORT:-8000}
      PORT: ${APP_PORT:-8000}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app
      - vendor:/app/vendor
    working_dir: /app

  db:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-cafe_api}
      MARIADB_USER: ${DB_USERNAME:-cafe}
      MARIADB_PASSWORD: ${DB_PASSWORD:-password}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
  vendor:
